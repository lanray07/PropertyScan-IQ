name: iOS Build Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build for iOS simulator
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm Xcode version
        run: |
          xcodebuild -version
          xcrun --sdk iphonesimulator --show-sdk-version

      - name: Build
        run: |
          xcodebuild build \
            -project PropertyScanIQ.xcodeproj \
            -scheme PropertyScanIQ \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO
